services:
  ytmusic-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ytmusic-api:latest
    container_name: ytmusic-api
    restart: always
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ytmusic-api.rule=Host(`${API_HOST:-api.nubcoders.com}`)"
      - "traefik.http.routers.ytmusic-api.entrypoints=websecure"
      - "traefik.http.routers.ytmusic-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ytmusic-api.loadbalancer.server.port=8000"
    volumes:
      - ${HOME}/.mozilla/firefox:/root/.mozilla/firefox:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  web:
    external: true
