version: "3.8"

services:
  tor-custom:
    image: alpine:latest
    container_name: tor-custom
    restart: always
    networks:
      - web
    ports:
      - "127.0.0.1:5090:5090"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: >
      sh -c '
        apk add --no-cache tor curl && \
        mkdir -p /etc/tor && \
        echo "SocksPort 0.0.0.0:5090" > /etc/tor/torrc && \
        echo "NewCircuitPeriod 1" >> /etc/tor/torrc && \
        echo "MaxCircuitDirtiness 1" >> /etc/tor/torrc && \
        echo "CircuitBuildTimeout 10" >> /etc/tor/torrc && \
        echo "LearnCircuitBuildTimeout 0" >> /etc/tor/torrc && \
        echo "NumEntryGuards 8" >> /etc/tor/torrc && \
        echo "UseBridges 0" >> /etc/tor/torrc && \
        echo "ClientOnly 1" >> /etc/tor/torrc && \
        tor -f /etc/tor/torrc --verify-config && \
        exec tor -f /etc/tor/torrc
      '

  yt-dlp-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-dlp-api:latest
    container_name: yt-dlp-api
    restart: always
    depends_on:
      - tor-custom
    networks:
      - web
    environment:
      # Use your desired host/domain and email for Let's Encrypt labels when using a reverse proxy
      - VIRTUAL_HOST=api.nubcoder.com
      - LETSENCRYPT_HOST=api.nubcoder.com
      - LETSENCRYPT_EMAIL=dev@nubcoder.com
      # If you want to expose the app directly, optionally set HOST and PORT envs here
      # - HOST=0.0.0.0
      # - PORT=8000
    # Uncomment the ports mapping if you want to access the service directly without a reverse-proxy
    #ports:
    #  - "8000:8000"
    # Optional Chrome/Chromium profile mount for cookie support (read-only)
    volumes:
      - ${HOME}/.config/google-chrome:/root/.config/google-chrome:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  web:
    external: true
